name: 🏗️ بناء وإصدار MedTracker

# يُشغَّل تلقائياً عند رفع tag مثل: git tag v3.1.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

  # تشغيل يدوي من واجهة GitHub Actions
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: v3.1.0)'
        required: true
        default: 'v3.0.0'

jobs:
  build-windows:
    name: بناء Windows x64
    runs-on: windows-latest

    steps:
      # ── 1. سحب الكود ────────────────────────────────────────────────────────
      - name: سحب الكود
        uses: actions/checkout@v4

      # ── 2. إعداد Node.js ────────────────────────────────────────────────────
      - name: إعداد Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 3. تثبيت المكتبات ────────────────────────────────────────────────────
      - name: تثبيت المكتبات
        run: npm ci

      # ── 4. تثبيت pkg عالمياً ────────────────────────────────────────────────
      - name: تثبيت pkg
        run: npm install -g pkg

      # ── 5. بناء الـ exe ──────────────────────────────────────────────────────
      - name: بناء الـ exe
        run: |
          mkdir -p dist
          pkg . --targets node18-win-x64 --output dist/medtracker.exe

      # ── 6. نسخ الملف الأصلي للـ SQLite بجانب الـ exe ───────────────────────
      - name: نسخ better_sqlite3.node
        shell: powershell
        run: |
          $src = "node_modules\better-sqlite3\build\Release\better_sqlite3.node"
          if (Test-Path $src) {
            Copy-Item $src "dist\better_sqlite3.node"
            Write-Host "✅ تم نسخ better_sqlite3.node"
          } else {
            Write-Error "❌ الملف $src غير موجود!"
            exit 1
          }

      # ── 7. إنشاء ملف التعليمات العربي ──────────────────────────────────────
      - name: إنشاء تعليمات التثبيت
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "${{ inputs.version }}" }

          $content = @"
          ╔═══════════════════════════════════════════╗
          ║         💊 MedTracker $version               ║
          ║    بوت تتبع صلاحية الأدوية — مجاني        ║
          ╚═══════════════════════════════════════════╝

          متطلبات التشغيل:
          ─────────────────
          • Windows 10 أو 11
          • اتصال بالإنترنت (للبوت وذكاء Groq AI)
          • حساب تليجرام

          خطوات التثبيت:
          ──────────────
          1. تأكد أن الملفين في نفس المجلد:
             📄 medtracker.exe
             📄 better_sqlite3.node

          2. شغّل medtracker.exe

          3. سيفتح المتصفح تلقائياً على صفحة الإعداد

          4. ستحتاج إلى:
             • توكن بوت تليجرام ← من @BotFather
             • Chat ID          ← من @userinfobot
             • مفتاح Groq AI    ← من console.groq.com (مجاني)

          5. بعد الإعداد، ستجد لوحة التحكم على:
             http://localhost:3000

          الدعم:
          ──────
          github.com/fahadx7/nupco-pharma
          "@

          [System.IO.File]::WriteAllText("dist\تعليمات-التثبيت.txt", $content, [System.Text.Encoding]::UTF8)
          Write-Host "✅ تم إنشاء ملف التعليمات"

      # ── 8. ضغط الملفات في ZIP ────────────────────────────────────────────────
      - name: ضغط الملفات
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "${{ inputs.version }}" }
          $zipName = "medtracker-$version-windows.zip"

          Compress-Archive -Path dist\* -DestinationPath "dist\$zipName" -Force
          Write-Host "✅ تم إنشاء $zipName"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      # ── 9. رفع الـ artifact للتحميل ─────────────────────────────────────────
      - name: رفع الـ artifact
        uses: actions/upload-artifact@v4
        with:
          name: medtracker-windows
          path: |
            dist/medtracker.exe
            dist/better_sqlite3.node
            dist/تعليمات-التثبيت.txt

      # ── 10. إنشاء GitHub Release تلقائي ─────────────────────────────────────
      - name: إنشاء GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "💊 MedTracker ${{ github.ref_name }}"
          files: dist/${{ env.ZIP_NAME }}
          body: |
            ## 💊 MedTracker ${{ github.ref_name }}
            > بوت تليجرام لتتبع صلاحية الأدوية — مجاني لجميع صيدليات المملكة

            ---

            ### 📥 التثبيت:

            1. نزّل ملف `${{ env.ZIP_NAME }}` من الأسفل
            2. فك الضغط في أي مجلد
            3. شغّل `medtracker.exe`
            4. سيفتح المتصفح تلقائياً لإعداد البوت

            ### ✅ ما ستحتاجه:
            | المطلوب | الحصول عليه |
            |--------|------------|
            | توكن البوت | من [@BotFather](https://t.me/BotFather) في تليجرام |
            | Chat ID | من [@userinfobot](https://t.me/userinfobot) |
            | مفتاح Groq AI | مجاناً من [console.groq.com](https://console.groq.com) |

            ### 💡 المميزات:
            - 📸 مسح فواتير نوبكو وعلب الأدوية (صور + PDF)
            - 📋 مخزون خاص بكل صيدلية (محلي 100%)
            - 🔔 تقرير يومي على تليجرام الساعة 9 صباحاً
            - 🌐 لوحة تحكم على `localhost:3000`
            - ⚙️ تشغيل تلقائي مع Windows
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
