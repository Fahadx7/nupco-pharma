name: 🏗️ بناء وإصدار نوبكو فارما v4

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: v4.0.0)'
        required: true
        default: 'v4.0.0'

jobs:
  build-windows:
    name: بناء Windows — NSIS Installer
    runs-on: windows-latest

    steps:
      - name: Checkout (feature branch)
        uses: actions/checkout@v4
        with:
          ref: claude/create-claude-md-cqwwl
          fetch-depth: 0

      - name: إعداد Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: تثبيت المكتبات
        run: npm install --legacy-peer-deps

      - name: إعادة بناء better-sqlite3 لـ Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: '2022'

      - name: بناء وتحزيم التطبيق
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: البحث عن ملف الإعداد
        id: find_installer
        shell: pwsh
        run: |
          $f = Get-ChildItem -Path release -Recurse -Filter "*.exe" | Where-Object { $_.Name -notlike "*unpacked*" } | Select-Object -First 1
          if (-not $f) {
            $f = Get-ChildItem -Path release -Recurse -Filter "*.exe" | Select-Object -First 1
          }
          echo "INSTALLER_PATH=$($f.FullName)" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$($f.Name)" >> $env:GITHUB_ENV
          Write-Host "✅ وُجد: $($f.FullName)"

      - name: رفع artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupco-pharma-windows-installer
          path: ${{ env.INSTALLER_PATH }}
          retention-days: 30

      - name: تحديد رقم الإصدار
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            echo "VER=${{ github.ref_name }}" >> $env:GITHUB_ENV
          } else {
            echo "VER=${{ inputs.version }}" >> $env:GITHUB_ENV
          }

      - name: إنشاء GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VER }}
          name: "💊 نوبكو فارما ${{ env.VER }}"
          files: ${{ env.INSTALLER_PATH }}
          body: |
            ## 💊 نوبكو فارما ${{ env.VER }}
            > نظام إدارة الصيدليات المتعدد — لجميع صيدليات المملكة

            ### ✨ المميزات:
            - لوحة تحكم متكاملة (11 شاشة)
            - إدارة المخزون مع تنبيهات انتهاء الصلاحية
            - الوصفات الطبية والمرضى والموردين
            - تقارير المصروفات والمبيعات
            - ربط تيليجرام لإشعارات فورية
            - واجهة عربية RTL داكنة

            ### 📥 التثبيت:
            1. نزّل الملف `نوبكو-فارما-Setup.exe` من الأسفل
            2. شغّل ملف الإعداد واتبع الخطوات
            3. عند أول تشغيل: أدخل بيانات الصيدلية ثم حساب المدير
            4. ابدأ الاستخدام 🚀

            ### ⚠️ ملاحظة SmartScreen:
            إذا ظهر تحذير Windows — اضغط **"معلومات إضافية" ← "تشغيل على أي حال"**
            التطبيق آمن 100% — التحذير بسبب عدم توقيع الكود رقمياً.

            ---
            صنع بـ ❤️ بواسطة [فهد A](https://t.me/AbuAmran2000_10)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
