name: 🏗️ بناء وإصدار MedTracker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار'
        required: true
        default: 'v3.0.2'

jobs:
  build-windows:
    name: بناء Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: إعداد Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت المكتبات
        shell: pwsh
        run: npm install --legacy-peer-deps

      - name: تثبيت pkg
        shell: pwsh
        run: npm install -g pkg@5.8.1

      - name: بناء الـ exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          pkg . --targets node20-win-x64 --output dist/medtracker.exe
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "✅ medtracker.exe جاهز"

      - name: نسخ محرك SQLite
        shell: pwsh
        run: |
          $src = "node_modules\better-sqlite3\prebuilds\win32-x64\node.napi.node"
          $src2 = "node_modules\better-sqlite3\build\Release\better_sqlite3.node"
          if (Test-Path $src) {
            Copy-Item $src "dist\better_sqlite3.node"
            Write-Host "✅ prebuilds"
          } elseif (Test-Path $src2) {
            Copy-Item $src2 "dist\better_sqlite3.node"
            Write-Host "✅ build/Release"
          } else {
            Write-Host "⚠️ بحث في كل المجلدات..."
            $found = Get-ChildItem -Path "node_modules\better-sqlite3" -Recurse -Filter "*.node" | Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName "dist\better_sqlite3.node"
              Write-Host "✅ وُجد في $($found.FullName)"
            } else {
              Write-Error "❌ لم يُعثر على better_sqlite3.node"
              exit 1
            }
          }

      - name: إنشاء تعليمات
        shell: pwsh
        run: |
          $v = if ("${{ github.ref_name }}") { "${{ github.ref_name }}" } else { "${{ inputs.version }}" }
          $c = "MedTracker $v`r`n=================`r`n`r`n1. الملفان يجب ان يكونا في نفس المجلد:`r`n   - medtracker.exe`r`n   - better_sqlite3.node`r`n`r`n2. شغل medtracker.exe`r`n`r`n3. افتح المتصفح على http://localhost:3000`r`n`r`nالدعم: github.com/fahadx7/nupco-pharma"
          [IO.File]::WriteAllText("dist\README.txt", $c, [Text.Encoding]::UTF8)

      - name: ضغط ZIP
        shell: pwsh
        run: |
          $v = if ("${{ github.ref_name }}") { "${{ github.ref_name }}" } else { "${{ inputs.version }}" }
          $z = "medtracker-$v-windows.zip"
          Compress-Archive -Path dist\medtracker.exe, dist\better_sqlite3.node, dist\README.txt -DestinationPath "dist\$z" -Force
          Add-Content $env:GITHUB_ENV "ZIP_NAME=$z"

      - name: رفع artifact
        uses: actions/upload-artifact@v4
        with:
          name: medtracker-windows
          path: dist/*.zip

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "💊 MedTracker ${{ github.ref_name }}"
          files: dist/${{ env.ZIP_NAME }}
          body: |
            ## 💊 MedTracker ${{ github.ref_name }}
            > متتبع الأدوية — مجاني لجميع صيدليات المملكة

            ### 📥 التثبيت:
            1. نزّل الملف من الأسفل وفك الضغط
            2. شغّل `medtracker.exe` (الملفان يجب في نفس المجلد)
            3. اتبع خطوات الإعداد في المتصفح

            ---
            صنع بـ ❤️ بواسطة [FHADAI](https://x.com/aboamran2011)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
