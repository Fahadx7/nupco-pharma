name: 🏗️ بناء وإصدار MedTracker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: v3.1.0)'
        required: true
        default: 'v3.0.0'

jobs:
  build-windows:
    name: بناء Windows x64
    runs-on: windows-latest

    steps:
      # ── 1. سحب الكود ────────────────────────────────────────────────────────
      - name: سحب الكود
        uses: actions/checkout@v4

      # ── 2. إعداد Node.js 18 ─────────────────────────────────────────────────
      - name: إعداد Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 3. تثبيت المكتبات (يُجمّع better-sqlite3 على Windows) ───────────────
      - name: تثبيت المكتبات
        shell: pwsh
        run: npm ci

      # ── 4. تثبيت pkg ─────────────────────────────────────────────────────────
      - name: تثبيت pkg
        shell: pwsh
        run: npm install -g pkg

      # ── 5. بناء الـ exe ──────────────────────────────────────────────────────
      - name: بناء الـ exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          pkg . --targets node18-win-x64 --output dist/medtracker.exe
          Write-Host "✅ تم بناء medtracker.exe"

      # ── 6. نسخ better_sqlite3.node بجانب الـ exe ────────────────────────────
      - name: نسخ محرك SQLite
        shell: pwsh
        run: |
          $src = "node_modules\better-sqlite3\build\Release\better_sqlite3.node"
          if (Test-Path $src) {
            Copy-Item $src "dist\better_sqlite3.node"
            Write-Host "✅ تم نسخ better_sqlite3.node"
          } else {
            Write-Error "❌ لم يُعثر على better_sqlite3.node — تأكد أن npm ci نجح"
            exit 1
          }

      # ── 7. إنشاء ملف التعليمات ───────────────────────────────────────────────
      - name: إنشاء تعليمات التثبيت
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_name }}") { "${{ github.ref_name }}" } else { "${{ inputs.version }}" }
          $content = @"
MedTracker $version — متتبع الادوية
=====================================

خطوات التثبيت:
1. تاكد ان الملفين في نفس المجلد:
   - medtracker.exe
   - better_sqlite3.node

2. شغل medtracker.exe

3. سيفتح المتصفح تلقائيا على صفحة الاعداد

4. ستحتاج الى:
   - توكن البوت    : من @BotFather في تيليجرام
   - Chat ID       : من @userinfobot في تيليجرام
   - مفتاح Groq AI : مجانا من console.groq.com

5. لوحة التحكم: http://localhost:3000

الدعم: github.com/fahadx7/nupco-pharma
"@
          [System.IO.File]::WriteAllText("dist\README.txt", $content, [System.Text.Encoding]::UTF8)
          Write-Host "✅ تم انشاء README.txt"

      # ── 8. ضغط الملفات ───────────────────────────────────────────────────────
      - name: ضغط الملفات في ZIP
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_name }}") { "${{ github.ref_name }}" } else { "${{ inputs.version }}" }
          $zipName = "medtracker-$version-windows.zip"
          Compress-Archive -Path dist\medtracker.exe, dist\better_sqlite3.node, dist\README.txt `
                           -DestinationPath "dist\$zipName" -Force
          Write-Host "✅ تم انشاء $zipName"
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_NAME=$zipName"

      # ── 9. رفع artifact ──────────────────────────────────────────────────────
      - name: رفع الـ artifact
        uses: actions/upload-artifact@v4
        with:
          name: medtracker-windows
          path: dist/*.zip

      # ── 10. إنشاء GitHub Release ─────────────────────────────────────────────
      - name: إنشاء GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "💊 MedTracker ${{ github.ref_name }}"
          files: dist/${{ env.ZIP_NAME }}
          body: |
            ## 💊 MedTracker ${{ github.ref_name }}
            > متتبع الأدوية — مجاني لجميع صيدليات المملكة

            ### 📥 طريقة التثبيت:
            1. نزّل `${{ env.ZIP_NAME }}` من الأسفل
            2. فك الضغط — ستجد ملفين **يجب أن يبقيا في نفس المجلد**
            3. شغّل `medtracker.exe`
            4. سيفتح المتصفح تلقائياً لإعداد البوت

            ### ✅ ما ستحتاجه:
            | المطلوب | الحصول عليه |
            |--------|------------|
            | توكن البوت | [@BotFather](https://t.me/BotFather) في تليجرام |
            | Chat ID | [@userinfobot](https://t.me/userinfobot) في تليجرام |
            | مفتاح Groq AI | مجاناً من [console.groq.com](https://console.groq.com) |

            ### 💡 المميزات:
            - 📸 مسح فواتير نوبكو وعلب الأدوية (صور + PDF)
            - 📋 مخزون خاص بكل صيدلية — محلي 100%
            - 🔔 تقرير يومي الساعة 9 صباحاً
            - 🌐 لوحة تحكم على `localhost:3000`
            - ⚙️ تشغيل تلقائي مع Windows

            ---
            صنع بـ ❤️ بواسطة [FHADAI](https://x.com/aboamran2011)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
